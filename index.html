<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재활 시스템 - 깔끔한 디자인 버전</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT5WAkV3v5OSRxC34aVDeyfeDCQWCWHTE",
            authDomain: "ptjw-1020.firebaseapp.com",
            projectId: "ptjw-1020",
            storageBucket: "ptjw-1020.firebasestorage.app",
            messagingSenderId: "320104083355",
            appId: "1:320104083355:web:9e979809a1bbd46807fb3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let defaultData = { "목": ["경추 스트레칭"], "어깨": ["진자 운동"] };
        window.exerciseData = {};
        window.exerciseDescriptions = {};
        window.isAdminMode = false; 
        window.selectedExercises = []; 

        async function loadAllData() {
            try {
                const listRef = doc(db, "settings", "exerciseList");
                const listSnap = await getDoc(listRef);
                window.exerciseData = listSnap.exists() ? listSnap.data() : defaultData;
                const descRef = doc(db, "settings", "exerciseDescriptions");
                const descSnap = await getDoc(descRef);
                if (descSnap.exists()) window.exerciseDescriptions = descSnap.data();
            } catch (e) { window.exerciseData = defaultData; }
            renderControls();
            renderPreview();
        }

        window.saveExerciseList = async function() {
            try {
                const categoryTitles = document.querySelectorAll('.category-title-text');
                const newData = {};
                categoryTitles.forEach(titleSpan => {
                    const oldKey = titleSpan.getAttribute('data-old-key');
                    const newKey = titleSpan.innerText.trim();
                    newData[newKey] = window.exerciseData[oldKey];
                });
                window.exerciseData = newData;
                await setDoc(doc(db, "settings", "exerciseList"), window.exerciseData);
                alert("목록이 저장되었습니다!");
                window.isAdminMode = false;
                renderControls();
            } catch (e) { alert("저장 실패!"); }
        }

        window.saveDescription = async function(id, text) {
            const docRef = doc(db, "settings", "exerciseDescriptions");
            const data = {}; data[id] = text;
            try {
                await setDoc(docRef, data, { merge: true });
                window.exerciseDescriptions[id] = text;
                alert("설명이 저장되었습니다!");
            } catch (e) { alert("저장 실패!"); }
        }

        window.toggleAdmin = function() { window.isAdminMode = !window.isAdminMode; renderControls(); }

        window.addCategory = function() {
            const name = prompt("새로운 부위 이름을 입력하세요");
            if (name && name.trim() !== '' && !window.exerciseData[name]) {
                window.exerciseData[name] = []; renderControls();
            }
        }

        window.deleteCategory = function(joint) {
            if(confirm(`[${joint}] 삭제하시겠습니까?`)) {
                window.selectedExercises = window.selectedExercises.filter(ex => ex.joint !== joint);
                delete window.exerciseData[joint]; renderControls(); renderPreview();
            }
        }

        window.addExercise = function(joint) {
            const name = prompt(`${joint}에 추가할 운동 이름`);
            if (name && name.trim() !== '') {
                window.exerciseData[joint].push(name.trim()); renderControls();
            }
        }

        window.deleteExercise = function(joint, index) {
            if(confirm("삭제하시겠습니까?")) {
                const name = window.exerciseData[joint][index];
                const id = `${joint}_${name}`;
                window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
                window.exerciseData[joint].splice(index, 1); renderControls(); renderPreview();
            }
        }

        window.handleCheck = function(checkbox) {
            const joint = checkbox.getAttribute('data-joint');
            const name = checkbox.getAttribute('data-name');
            const id = `${joint}_${name}`;
            if (checkbox.checked) window.selectedExercises.push({ joint, name, id });
            else window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
            renderPreview();
        }

        function renderControls() {
            const controls = document.getElementById('controls');
            controls.innerHTML = "";
            for (const [joint, exercises] of Object.entries(window.exerciseData)) {
                const div = document.createElement('div');
                div.className = 'category-box';
                div.innerHTML = `
                    <div class="category-title">
                        <span class="category-title-text" contenteditable="${window.isAdminMode}" data-old-key="${joint}"
                              style="${window.isAdminMode ? 'background:#fff; padding:0 5px; border:1px solid #007bff;' : ''}">${joint}</span>
                        <div>
                            ${window.isAdminMode ? `<button class="admin-action-btn" onclick="addExercise('${joint}')">+ 추가</button>` : ''}
                            ${window.isAdminMode ? `<button class="admin-action-btn delete-btn" onclick="deleteCategory('${joint}')">🗑️</button>` : ''}
                        </div>
                    </div>
                `;
                exercises.forEach((ex, idx) => {
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'exercise-item';
                    const isChecked = window.selectedExercises.some(item => item.id === `${joint}_${ex}`) ? 'checked' : '';
                    labelDiv.innerHTML = `
                        <label class="checkbox-label">
                            <input type="checkbox" class="ex-check" data-joint="${joint}" data-name="${ex}" onchange="handleCheck(this)" ${isChecked}> 
                            <span class="ex-name">${ex}</span>
                        </label>
                        ${window.isAdminMode ? `<button class="admin-del-btn" onclick="deleteExercise('${joint}', ${idx})">❌</button>` : ''}
                    `;
                    div.appendChild(labelDiv);
                });
                controls.appendChild(div);
            }
            const adminArea = document.getElementById('admin-area');
            adminArea.innerHTML = window.isAdminMode ? 
                `<button class="admin-btn save" onclick="saveExerciseList()">💾 명칭 수정 및 목록 전체 저장</button>
                 <button class="admin-btn add" onclick="addCategory()">➕ 새 부위 추가</button>
                 <button class="admin-btn cancel" onclick="toggleAdmin()">취소</button>` :
                `<button class="admin-btn" onclick="toggleAdmin()">⚙️ 목록 및 명칭 수정(관리자)</button>`;
        }

        window.renderPreview = function() {
            const container = document.getElementById('page-container');
            const patientName = document.getElementById('patientNameInput').value || "________";
            const therapistName = document.getElementById('therapistNameInput').value || "________";
            container.innerHTML = "";
            if (window.selectedExercises.length === 0) {
                container.innerHTML = `<div class="a4-page no-print" style="display:flex; justify-content:center; align-items:center;"><p style="color: #999;">운동을 선택해 주세요.</p></div>`;
                return;
            }
            window.selectedExercises.forEach((item, index) => {
                const page = document.createElement('div');
                page.className = 'a4-page';
                let headerHtml = (index === 0) ? `
                    <div class="page-header">
                        <h1>재활 운동 가이드</h1>
                        <div class="patient-info">
                            환자 성함: <span class="info-val">${patientName}</span>님<br>
                            담당 치료사: <span class="info-val">${therapistName}</span> 선생님<br>
                            날짜: <span class="info-val">${new Date().toLocaleDateString()}</span>
                        </div>
                    </div>` : `<div class="page-header empty-header"></div>`;
                const joint = item.joint;
                const name = item.name;
                const id = item.id;
                const desc = window.exerciseDescriptions[id] || `<strong>운동 목적:</strong> ${joint} 부위 기능 회복<br><br><strong>수행 방법:</strong> 10~15회씩 3세트 반복하세요.`;
                page.innerHTML = `
                    ${headerHtml}
                    <div class="page-content">
                        <img src="https://via.placeholder.com/600x600?text=${joint}+Exercise" class="exercise-img">
                        <div class="exercise-details">
                            <h3>[${joint}] ${name}</h3>
                            <div contenteditable="true" id="desc_${id}" class="editable-desc">${desc}</div>
                            <button class="no-print save-btn" onclick="saveDescription('${id}', document.getElementById('desc_${id}').innerHTML)">💾 설명 저장</button>
                        </div>
                    </div>
                `;
                container.appendChild(page);
            });
        }
        loadAllData();
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: #515659; }
        #sidebar { width: 300px; height: 100vh; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.3); overflow-y: auto; position: fixed; left: 0; top: 0; z-index: 100; box-sizing: border-box; }
        #preview-area { margin-left: 300px; padding: 20px; width: calc(100% - 300px); display: flex; flex-direction: column; align-items: center; }
        .category-box { background: #f4f4f4; padding: 12px; margin-bottom: 12px; border-radius: 8px; }
        .category-title { font-weight: bold; color: #007bff; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 5px; font-size: 15px; }
        .exercise-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; font-size: 14px; }
        .admin-action-btn { background: #e9ecef; border: 1px solid #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
        .admin-del-btn { background: none; border: none; cursor: pointer; color: #dc3545; font-size: 12px; }
        .admin-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 13px; font-weight: bold; }
        .admin-btn.save { background: #007bff; color: white; border: none; }
        .print-btn-fixed { position: fixed; top: 15px; right: 25px; z-index: 1000; padding: 10px 20px; background: #007bff; color: #fff; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .a4-page { width: 297mm; height: 210mm; background: #fff; margin-bottom: 20px; padding: 8mm 15mm 15mm 15mm; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 헤더 부분 밑줄 제거 및 정돈 */
        .page-header { height: 18mm; border-bottom: 3px solid #333; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 8px; margin-bottom: 6mm; }
        .page-header h1 { margin: 0; font-size: 24pt; font-weight: 800; color: #333; }
        .patient-info { text-align: right; font-size: 11pt; line-height: 1.5; color: #444; }
        .info-val { font-weight: bold; color: #000; padding: 0 2px; border-bottom: none !important; } /* 밑줄 완전 제거 */

        .page-content { flex: 1; display: flex; gap: 30px; border: 1px solid #eee; padding: 15px; border-radius: 12px; background: #fff; }
        .exercise-img { width: 65%; object-fit: contain; background: #fff; border: 1px solid #f0f0f0; border-radius: 10px; }
        .exercise-details { width: 35%; display: flex; flex-direction: column; }
        
        /* 운동 제목 부분 밑줄 제거 */
        .exercise-details h3 { margin: 0 0 15px 0; font-size: 19pt; color: #0056b3; font-weight: bold; border-bottom: none; } 
        .editable-desc { flex: 1; font-size: 10.8pt; line-height: 1.7; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; overflow-y: auto; }
        .save-btn { margin-top: 10px; padding: 8px; background: #52c41a; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            #sidebar, .print-btn-fixed, .save-btn, .no-print { display: none !important; }
            #preview-area { margin: 0; padding: 0; width: 100%; }
            .a4-page { width: 100vw; height: 100vh; margin: 0; page-break-after: always; box-shadow: none; border: none; }
            .page-content { border: 1px solid #ddd; }
            .editable-desc { background: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>
    <button class="print-btn-fixed no-print" onclick="window.print()">🖨️ 가이드 인쇄</button>
    <div id="sidebar">
        <h2 style="font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px;">재활 가이드 설정</h2>
        <div style="margin-bottom:15px;">
            <label style="font-size: 11px; font-weight: bold; color: #777;">환자 성함</label>
            <input type="text" id="patientNameInput" placeholder="이름 입력" oninput="renderPreview()" style="width:100%; padding:10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-size: 11px; font-weight: bold; color: #777;">담당 치료사</label>
            <input type="text" id="therapistNameInput" placeholder="치료사 성함" oninput="renderPreview()" style="width:100%; padding:10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        <div id="controls"></div>
        <div id="admin-area" class="no-print"></div>
    </div>
    <div id="preview-area"><div id="page-container"></div></div>
</body>
</html>
