<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재활 시스템 - 운동명 수정 및 자동 이사(마이그레이션)</title>
    
    <style id="dynamic-print-style">
        @media print { @page { size: landscape; margin: 0; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT5WAkV3v5OSRxC34aVDeyfeDCQWCWHTE",
            authDomain: "ptjw-1020.firebaseapp.com",
            projectId: "ptjw-1020",
            storageBucket: "ptjw-1020.firebasestorage.app",
            messagingSenderId: "320104083355",
            appId: "1:320104083355:web:9e979809a1bbd46807fb3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.therapistDB = { "0000": "최고관리자" }; 
        window.exerciseData = {};
        window.exerciseDescriptions = {};
        window.exerciseImages = {}; 
        window.exerciseVideos = {}; 
        window.patientDB = {}; 
        window.isAdminMode = false; 
        window.selectedExercises = []; 
        window.keyMigrations = {}; // 🌟 이름이 바뀐 운동들의 데이터를 옮기기 위한 이사 명부

        window.onload = async function() {
            await loadAllData(); 
            const savedName = sessionStorage.getItem('loggedInName');
            if (savedName) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('logged-in-user').innerText = savedName;
                renderAdminFunctions(); 
            }
        };

        async function loadAllData() {
            try {
                const tSnap = await getDoc(doc(db, "settings", "therapists"));
                if (tSnap.exists()) window.therapistDB = tSnap.data();
                if (!window.therapistDB["0000"]) window.therapistDB["0000"] = "최고관리자";

                const pSnap = await getDoc(doc(db, "settings", "patients"));
                if (pSnap.exists()) window.patientDB = pSnap.data();

                const listSnap = await getDoc(doc(db, "settings", "exerciseList"));
                let rawData = listSnap.exists() ? listSnap.data() : {};
                
                const requiredCategories = ["목", "어깨", "팔꿈치", "손목", "허리", "무릎", "발목"];
                requiredCategories.forEach(cat => {
                    if (!rawData[cat]) rawData[cat] = { "스트레칭": [], "운동": [] };
                });
                for (let key in rawData) { if (Array.isArray(rawData[key])) { rawData[key] = { "스트레칭": rawData[key], "운동": [] }; } }
                window.exerciseData = rawData;

                const descSnap = await getDoc(doc(db, "settings", "exerciseDescriptions"));
                if (descSnap.exists()) window.exerciseDescriptions = descSnap.data();
                
                const imgSnap = await getDoc(doc(db, "settings", "exerciseImages"));
                if (imgSnap.exists()) {
                    let loadedImgs = imgSnap.data();
                    for (let k in loadedImgs) { if (typeof loadedImgs[k] === 'string') { loadedImgs[k] = [loadedImgs[k]]; } }
                    window.exerciseImages = loadedImgs;
                }

                const vidSnap = await getDoc(doc(db, "settings", "exerciseVideos"));
                if (vidSnap.exists()) window.exerciseVideos = vidSnap.data();

            } catch (e) { console.error(e); }
            renderControls(); renderPatientList(); renderPreview();
        }

        window.attemptLogin = function() {
            const idInput = document.getElementById('emp-id').value.trim();
            if (window.therapistDB[idInput]) {
                sessionStorage.setItem('loggedInID', idInput);
                sessionStorage.setItem('loggedInName', window.therapistDB[idInput]);
                location.reload(); 
            } else { alert("등록되지 않은 사원번호입니다."); }
        };

        function renderAdminFunctions() {
            const loginID = sessionStorage.getItem('loggedInID');
            document.getElementById('super-admin-panel').style.display = (loginID === '0000') ? 'block' : 'none';
            if (loginID === '0000') renderTherapistList();
        }

        window.addTherapist = async function() {
            const id = prompt("사원번호:"); if (!id) return;
            const name = prompt("이름:"); if (!name) return;
            window.therapistDB[id] = name;
            await setDoc(doc(db, "settings", "therapists"), window.therapistDB);
            renderTherapistList();
        };

        window.deleteTherapist = async function(id) {
            if (id === '0000') return alert("삭제 불가");
            if (confirm("삭제?")) { delete window.therapistDB[id]; await setDoc(doc(db, "settings", "therapists"), window.therapistDB); renderTherapistList(); }
        };

        function renderTherapistList() {
            const listDiv = document.getElementById('t-list'); listDiv.innerHTML = "";
            for (const [id, name] of Object.entries(window.therapistDB)) { if (id !== '0000') listDiv.innerHTML += `<div class="t-item"><span>${id}: ${name}</span> <button onclick="deleteTherapist('${id}')">삭제</button></div>`; }
        }

        window.logout = function() { sessionStorage.clear(); location.reload(); };

        window.setPrintMode = function(mode) {
            const styleTag = document.getElementById('dynamic-print-style');
            if (mode === 'portrait') {
                document.body.className = 'portrait-mode';
                styleTag.innerHTML = '@media print { @page { size: portrait; margin: 0; } }';
                document.getElementById('mode-portrait-btn').classList.add('active');
                document.getElementById('mode-landscape-btn').classList.remove('active');
            } else {
                document.body.className = 'landscape-mode';
                styleTag.innerHTML = '@media print { @page { size: landscape; margin: 0; } }';
                document.getElementById('mode-landscape-btn').classList.add('active');
                document.getElementById('mode-portrait-btn').classList.remove('active');
            }
        };

        window.savePatientRoutine = async function() {
            const pName = document.getElementById('pIn').value.trim();
            const chartID = document.getElementById('chartIn').value.trim();
            const pMemo = document.getElementById('pMemo').value.trim(); 
            const loggedInID = sessionStorage.getItem('loggedInID');

            if (!pName || !chartID) return alert("성함과 병록번호 필수!");
            if (window.selectedExercises.length === 0) return alert("운동 선택 필수!");

            const saveKey = `${chartID}_${pName}_${Date.now()}`; 
            window.patientDB[saveKey] = {
                chartID, pName, memo: pMemo,
                exercises: window.selectedExercises,
                therapistName: sessionStorage.getItem('loggedInName'),
                therapistID: loggedInID,
                date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };
            try { await setDoc(doc(db, "settings", "patients"), window.patientDB); alert("처방과 메모가 저장되었습니다."); renderPatientList(); } catch (e) { alert("실패!"); }
        };

        window.loadPatientRoutine = function(key) {
            const pData = window.patientDB[key];
            document.getElementById('pIn').value = pData.pName; 
            document.getElementById('chartIn').value = pData.chartID;
            document.getElementById('pMemo').value = pData.memo || ""; 
            window.selectedExercises = [...pData.exercises]; 
            renderControls(); renderPreview();  
            alert("환자 기록을 불러왔습니다.");
        };

        window.deletePatientRoutine = async function(key) {
            if (confirm("삭제?")) { delete window.patientDB[key]; await setDoc(doc(db, "settings", "patients"), window.patientDB); renderPatientList(); }
        };

        function renderPatientList() {
            const pListDiv = document.getElementById('patient-list-container'); pListDiv.innerHTML = "";
            const currentID = sessionStorage.getItem('loggedInID');
            const grouped = {};
            Object.entries(window.patientDB).forEach(([key, d]) => {
                if (currentID !== '0000' && d.therapistID !== currentID) return;
                const pKey = `${d.chartID}_${d.pName}`;
                if (!grouped[pKey]) grouped[pKey] = [];
                grouped[pKey].push({ key, ...d });
            });
            for (const [pKey, records] of Object.entries(grouped)) {
                const sortedRecords = records.sort((a,b) => b.key.split('_')[2] - a.key.split('_')[2]); 
                const pName = sortedRecords[0].pName;
                const chartID = sortedRecords[0].chartID;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'patient-group';
                groupDiv.innerHTML = `
                    <div class="patient-group-title" onclick="this.nextElementSibling.classList.toggle('active')">
                        <strong>👤 ${pName}</strong> <span style="font-size:11px;">(#${chartID})</span>
                    </div>
                    <div class="patient-group-content">
                        ${sortedRecords.map(r => `
                            <div class="visit-record">
                                <div class="visit-date">📅 ${r.date} ${r.memo ? '<span style="color:#007bff;font-weight:bold;">[메모있음]</span>' : ''}</div>
                                <div class="p-card-actions">
                                    <button class="p-btn-load" onclick="loadPatientRoutine('${r.key}')">불러오기</button>
                                    <button class="p-btn-del" onclick="deletePatientRoutine('${r.key}')">삭제</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                pListDiv.appendChild(groupDiv);
            }
        }

        window.filterExercises = function() {
            const keyword = document.getElementById('searchEx').value.toLowerCase().trim();
            if (keyword === "") {
                document.querySelectorAll('.exercise-item').forEach(item => item.style.display = 'flex');
                document.querySelectorAll('.folder-box').forEach(box => box.style.display = 'block');
                document.querySelectorAll('.category-box').forEach(box => box.style.display = 'block');
                return;
            }
            document.querySelectorAll('.exercise-item').forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(keyword) ? 'flex' : 'none';
            });
            document.querySelectorAll('.folder-box').forEach(box => {
                const visible = Array.from(box.querySelectorAll('.exercise-item')).some(item => item.style.display !== 'none');
                box.style.display = visible ? 'block' : 'none';
            });
            document.querySelectorAll('.category-box').forEach(box => {
                const visible = Array.from(box.querySelectorAll('.folder-box')).some(f => f.style.display !== 'none');
                box.style.display = visible ? 'block' : 'none';
            });
        };

        // 🌟 수정 중인 DOM을 실시간으로 Data에 동기화 & 바뀐 이름 추적 🌟
        function syncDOMtoData() {
            if (!window.isAdminMode) return;
            const categories = document.querySelectorAll('.category-box');
            const newData = {};
            window.keyMigrations = {}; // 이사 명부 초기화

            categories.forEach(cat => {
                const catTitle = cat.querySelector('.category-title-text').innerText.trim();
                const oldCat = cat.querySelector('.category-title-text').getAttribute('data-old-key');
                if (!catTitle) return; 
                newData[catTitle] = {};
                
                const folders = cat.querySelectorAll('.folder-box');
                folders.forEach(fld => {
                    const fTitle = fld.querySelector('.folder-title-text').innerText.trim();
                    if (!fTitle) return;
                    
                    let exercises = [];
                    const exSpans = fld.querySelectorAll('.exercise-title-text');
                    
                    exSpans.forEach(span => {
                        const exName = span.innerText.trim();
                        const oldEx = span.getAttribute('data-old-ex-key');
                        if(exName) {
                            exercises.push(exName);
                            const oldFullKey = `${oldCat}_${oldEx}`;
                            const newFullKey = `${catTitle}_${exName}`;
                            // 이름이 바뀌었다면 이사 명부에 등록
                            if (oldFullKey !== newFullKey) {
                                window.keyMigrations[oldFullKey] = newFullKey;
                            }
                        }
                    });
                    newData[catTitle][fTitle] = exercises;
                });
            });
            window.exerciseData = newData;
        }

        window.toggleAdmin = async function() { 
            if (window.isAdminMode) {
                syncDOMtoData();
                
                // 🌟 이사 명부를 확인하여 설명/사진/영상을 새 이름으로 마이그레이션 🌟
                let metaChanged = false;
                for (let oldKey in window.keyMigrations) {
                    let newKey = window.keyMigrations[oldKey];
                    
                    if (window.exerciseDescriptions[oldKey] !== undefined) {
                        window.exerciseDescriptions[newKey] = window.exerciseDescriptions[oldKey];
                        delete window.exerciseDescriptions[oldKey];
                        metaChanged = true;
                    }
                    if (window.exerciseImages[oldKey] !== undefined) {
                        window.exerciseImages[newKey] = window.exerciseImages[oldKey];
                        delete window.exerciseImages[oldKey];
                        metaChanged = true;
                    }
                    if (window.exerciseVideos[oldKey] !== undefined) {
                        window.exerciseVideos[newKey] = window.exerciseVideos[oldKey];
                        delete window.exerciseVideos[oldKey];
                        metaChanged = true;
                    }
                    // 체크된 항목 이름도 업데이트
                    window.selectedExercises = window.selectedExercises.map(ex => {
                        if (ex.id === oldKey) {
                            const parts = newKey.split('_');
                            return { joint: parts[0], name: parts[1], id: newKey };
                        }
                        return ex;
                    });
                }

                await setDoc(doc(db, "settings", "exerciseList"), window.exerciseData);
                if(metaChanged) {
                    await setDoc(doc(db, "settings", "exerciseDescriptions"), window.exerciseDescriptions);
                    await setDoc(doc(db, "settings", "exerciseImages"), window.exerciseImages);
                    await setDoc(doc(db, "settings", "exerciseVideos"), window.exerciseVideos);
                }
                
                window.isAdminMode = false;
            } else {
                document.getElementById('searchEx').value = ""; 
                window.isAdminMode = true; 
            }
            renderControls(); 
            const btn = document.getElementById('admin-toggle-btn');
            btn.innerText = window.isAdminMode ? "💾 수정 완료 (자동저장)" : "⚙️ 목록 수정";
            btn.style.background = window.isAdminMode ? "#dc3545" : "#6c757d";
        };

        window.addCategory = function() { syncDOMtoData(); const n = prompt("부위명:"); if(n && !window.exerciseData[n]) { window.exerciseData[n] = {"스트레칭": [], "운동": []}; renderControls(); } }
        window.deleteCategory = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); if(confirm(`[${catTitle}] 삭제?`)) { delete window.exerciseData[catTitle]; renderControls(); renderPreview(); } }
        window.addFolder = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const f = prompt(`새 폴더명:`); if (f && !window.exerciseData[catTitle][f]) { window.exerciseData[catTitle][f] = []; renderControls(); } }
        window.deleteFolder = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); if(confirm(`삭제?`)) { delete window.exerciseData[catTitle][fTitle]; renderControls(); renderPreview(); } }
        window.addExercise = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); const n = prompt(`운동명:`); if(n) { window.exerciseData[catTitle][fTitle].push(n); renderControls(); } }
        window.deleteExercise = function(btn, exName) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); window.exerciseData[catTitle][fTitle] = window.exerciseData[catTitle][fTitle].filter(e => e !== exName); renderControls(); renderPreview(); }
        
        window.handleCheck = function(c) {
            const j = c.getAttribute('data-joint'), n = c.getAttribute('data-name'), id = `${j}_${n}`;
            if (c.checked) window.selectedExercises.push({ joint:j, name:n, id:id }); else window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
            renderPreview();
        }

        window.saveDescription = async function(id, text) { await setDoc(doc(db, "settings", "exerciseDescriptions"), { [id]: text }, { merge: true }); alert("설명 저장!"); }
        window.setVideoLink = async function(id) { const currentUrl = window.exerciseVideos[id] || ""; const url = prompt("유튜브(영상) 주소:", currentUrl); if (url !== null) { try { await setDoc(doc(db, "settings", "exerciseVideos"), { [id]: url }, { merge: true }); window.exerciseVideos[id] = url; renderPreview(); } catch(e) { alert("저장 실패!"); } } };
        window.addMacro = function(id, text) { const descBox = document.getElementById(`desc_${id}`); descBox.innerHTML += (descBox.innerHTML.trim() === '' ? '' : '<br>') + `▶ ${text}`; saveDescription(id, descBox.innerHTML); };

        window.processAndSaveImage = function(file, id) {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image(); img.src = event.target.result;
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height; const MAX = 600; 
                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7); 
                    let imgs = window.exerciseImages[id] || []; if (typeof imgs === 'string') imgs = [imgs];
                    imgs.push(base64);
                    try { await setDoc(doc(db, "settings", "exerciseImages"), { [id]: imgs }, { merge: true }); window.exerciseImages[id] = imgs; renderPreview(); } catch (e) { alert("용량 초과"); }
                }
            };
        }
        window.clearImages = async function(id) { if (confirm("전체 삭제?")) { await setDoc(doc(db, "settings", "exerciseImages"), { [id]: [] }, { merge: true }); window.exerciseImages[id] = []; renderPreview(); } }
        window.handlePaste = function(e, id) { const items = (e.clipboardData || e.originalEvent.clipboardData).items; for (let i in items) { if (items[i].kind === 'file' && items[i].type.startsWith('image/')) { processAndSaveImage(items[i].getAsFile(), id); break; } } }

        function renderControls() {
            const c = document.getElementById('controls'); c.innerHTML = "";
            for (const [joint, folders] of Object.entries(window.exerciseData)) {
                const div = document.createElement('div'); div.className = 'category-box';
                div.innerHTML = `<div class="category-title"><span class="category-title-text" contenteditable="${window.isAdminMode}" data-old-key="${joint}" style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:0 4px; border-radius:4px;' : ''}">${joint}</span>${window.isAdminMode ? `<div><button onclick="addFolder(this)">📁+</button> <button onclick="deleteCategory(this)">🗑️</button></div>` : ''}</div>`;
                for (const [folder, exercises] of Object.entries(folders)) {
                    const fDiv = document.createElement('div'); fDiv.className = 'folder-box'; fDiv.setAttribute('data-old-folder-key', folder);
                    fDiv.innerHTML = `<div class="folder-title"><span>📂 <span class="folder-title-text" contenteditable="${window.isAdminMode}" style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:0 4px; border-radius:4px;' : ''}">${folder}</span></span>${window.isAdminMode ? `<div><button onclick="addExercise(this)">+</button> <button onclick="deleteFolder(this)">🗑️</button></div>` : ''}</div>`;
                    
                    exercises.forEach((ex) => {
                        const id = `${joint}_${ex}`; const isChecked = window.selectedExercises.some(s => s.id === id) ? 'checked' : '';
                        // 🌟 운동명 수정 기능 (label의 클릭 간섭을 막기 위한 구조 적용) 🌟
                        fDiv.innerHTML += `
                        <div class="exercise-item" style="display:flex; align-items:center; margin-bottom:5px;">
                            <label style="flex:1; display:flex; align-items:center; gap:5px; margin:0; cursor:pointer;">
                                <input type="checkbox" data-joint="${joint}" data-folder="${folder}" data-name="${ex}" onchange="handleCheck(this)" ${isChecked}>
                                <span class="exercise-title-text" contenteditable="${window.isAdminMode}" data-old-ex-key="${ex}" 
                                      style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:2px 4px; border-radius:4px; flex:1; cursor:text;' : 'flex:1;'}" 
                                      onclick="if(window.isAdminMode) event.preventDefault();">${ex}</span>
                            </label>
                            ${window.isAdminMode ? `<button onclick="deleteExercise(this, '${ex}')" style="margin-left:5px; border-radius:3px; border:1px solid #ccc; background:#fff; cursor:pointer;">❌</button>` : ''}
                        </div>`;
                    }); div.appendChild(fDiv);
                } c.appendChild(div);
            }
            document.getElementById('admin-area').innerHTML = window.isAdminMode ? `<button class="admin-btn" onclick="addCategory()" style="background:#28a745; color:white; padding:12px; font-size:14px; margin-top:10px;">➕ 대분류(부위) 추가</button>` : '';
            filterExercises();
        }

        window.renderPreview = function() {
            const container = document.getElementById('page-container');
            const pName = document.getElementById('pIn').value || "________";
            const tName = sessionStorage.getItem('loggedInName') || "________";
            container.innerHTML = "";
            if (window.selectedExercises.length === 0) { container.innerHTML = `<div class="a4-page"><p style="color:#ccc; text-align:center; margin-top:100px;">운동을 선택하세요.</p></div>`; return; }
            
            window.selectedExercises.forEach((item, idx) => {
                const id = item.id; const desc = window.exerciseDescriptions[id] || "방법을 입력하세요."; 
                let imgs = window.exerciseImages[id] || []; if (typeof imgs === 'string') imgs = [imgs];
                let imgHtml = imgs.length === 0 ? `<div class="no-img-placeholder">Ctrl+V로 사진 추가</div>` : `<div class="vertical-img-container">${imgs.map((src, i) => `<div class="split-img-item"><img src="${src}"><div class="img-idx-badge">${i+1}</div></div>`).join('')}</div>`;
                
                const vidUrl = window.exerciseVideos[id];
                const qrHtml = vidUrl 
                    ? `<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=${encodeURIComponent(vidUrl)}" class="qr-img"><div style="font-size:10px; text-align:center; margin-top:3px; color:#555; font-weight:bold;">영상 보기</div></div>`
                    : `<div class="qr-placeholder no-print">영상 없음</div>`;

                const fileUploadHtml = `
                    <div class="no-print" style="position: absolute; bottom: 10px; left: 10px; display:flex; gap:8px;">
                        <button class="img-edit-btn" onclick="document.getElementById('f_${id}').click()">📁 사진추가</button>
                        <button class="img-edit-btn" style="background:#17a2b8;" onclick="setVideoLink('${id}')">🔗 QR 링크</button>
                        ${imgs.length > 0 ? `<button class="img-edit-btn" style="background:#dc3545;" onclick="clearImages('${id}')">🗑️ 지우기</button>` : ''}
                        <input type="file" id="f_${id}" accept="image/*" style="display:none" onchange="uploadLocalFile(this, '${id}')">
                    </div>`;
                
                const macroHtml = `
                    <div class="macro-btns no-print">
                        <button onclick="addMacro('${id}', '10회 x 3세트 진행합니다.')">10회 3세트</button>
                        <button onclick="addMacro('${id}', '15회 x 3세트 진행합니다.')">15회 3세트</button>

                    </div>`;

                container.innerHTML += `
                <div class="a4-page">
                    <div class="page-header">
                        <h1>재활 운동 가이드</h1>
                        <div class="patient-info">환자: <b>${pName}</b>님 / 담당치료사: <b>${tName}</b></div>
                    </div>
                    <div class="page-content">
                        <div class="img-wrap" tabindex="0" onpaste="handlePaste(event, '${id}')">${imgHtml}${fileUploadHtml}</div>
                        <div class="exercise-details">
                            <div class="exercise-title-row">
                                <h3>[${item.joint}] ${item.name}</h3>
                                <button class="no-print save-btn" onclick="saveDescription('${id}', document.getElementById('desc_${id}').innerHTML)">💾 저장</button>
                            </div>
                            ${macroHtml}
                            <div contenteditable="true" id="desc_${id}" class="editable-desc">${desc}</div>
                            ${qrHtml}
                        </div>
                    </div>
                    <div class="page-footer">
                        <div class="footer-warning">🚨 주의: 운동 중 찌릿하거나 날카로운 통증이 발생하면 즉시 중단하고 치료사에게 문의하세요.</div>
                        <div class="page-num-indicator">${idx + 1} / ${window.selectedExercises.length}</div>
                    </div>
                </div>`;
            });
        }

<body class="landscape-mode">

    <div id="login-overlay">
