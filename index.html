<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재활 시스템 - 카테고리 삭제 기능 추가</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT5WAkV3v5OSRxC34aVDeyfeDCQWCWHTE",
            authDomain: "ptjw-1020.firebaseapp.com",
            projectId: "ptjw-1020",
            storageBucket: "ptjw-1020.firebasestorage.app",
            messagingSenderId: "320104083355",
            appId: "1:320104083355:web:9e979809a1bbd46807fb3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 기본 데이터
        let defaultData = {
            "목": ["경추 스트레칭", "맥켄지 운동", "턱 당기기", "목 옆쪽 늘리기", "승모근 이완"],
            "어깨": ["진자 운동", "수건 이용 회전근개", "벽 밀기", "밴드 당기기", "어깨 으쓱"],
            "허리": ["골반 기울이기", "버드독", "데드버그", "코브라 자세", "이상근 스트레칭"],
            "무릎": ["대퇴사두근 수축", "다리 들어올리기", "미니 스쿼트", "햄스트링 스트레칭", "종아리 늘리기"],
            "팔꿈치": ["손목 굴곡근 스트레칭", "손목 신전근 스트레칭", "덤벨 컬", "리버스 컬", "팔꿈치 펴기"],
            "손목": ["손목 회전", "주먹 쥐기", "고무줄 벌리기", "손가락 펴기", "손바닥 밀기"],
            "발목": ["발목 펌프", "발가락 수건 당기기", "밴드 발목 밀기", "한 발 서기", "비골근 강화"]
        };

        window.exerciseData = {};
        window.exerciseDescriptions = {};
        window.isAdminMode = false; 
        
        // 클릭한 순서대로 저장하는 대기열
        window.selectedExercises = []; 

        async function loadAllData() {
            try {
                const listRef = doc(db, "settings", "exerciseList");
                const listSnap = await getDoc(listRef);
                window.exerciseData = listSnap.exists() ? listSnap.data() : defaultData;

                const descRef = doc(db, "settings", "exerciseDescriptions");
                const descSnap = await getDoc(descRef);
                if (descSnap.exists()) window.exerciseDescriptions = descSnap.data();
            } catch (e) { 
                window.exerciseData = defaultData;
            }
            renderControls();
            renderPreview();
        }

        window.saveExerciseList = async function() {
            try {
                await setDoc(doc(db, "settings", "exerciseList"), window.exerciseData);
                alert("전체 운동 목록이 서버에 저장되었습니다!");
                window.isAdminMode = false;
                renderControls();
            } catch (e) { alert("저장 실패!"); }
        }

        window.saveDescription = async function(id, text) {
            const docRef = doc(db, "settings", "exerciseDescriptions");
            const data = {}; data[id] = text;
            try {
                await setDoc(docRef, data, { merge: true });
                window.exerciseDescriptions[id] = text;
                alert("설명이 서버에 저장되었습니다!");
            } catch (e) { alert("저장 실패!"); }
        }

        window.toggleAdmin = function() {
            window.isAdminMode = !window.isAdminMode;
            renderControls();
        }

        window.addCategory = function() {
            const name = prompt("새로운 부위 이름을 입력하세요 (예: 손가락)");
            if (name && name.trim() !== '' && !window.exerciseData[name]) {
                window.exerciseData[name] = [];
                renderControls();
            }
        }

        // ★ 새로 추가된 큰 카테고리 삭제 기능 ★
        window.deleteCategory = function(joint) {
            if(confirm(`정말 [${joint}] 부위를 통째로 삭제하시겠습니까?\n이 안에 포함된 모든 운동도 함께 지워집니다.`)) {
                // 화면(대기열)에 띄워둔 해당 부위의 운동들도 한 번에 싹 지움
                window.selectedExercises = window.selectedExercises.filter(ex => ex.joint !== joint);
                
                // 데이터에서 카테고리 완전 삭제
                delete window.exerciseData[joint];
                renderControls();
                renderPreview();
            }
        }

        window.addExercise = function(joint) {
            const name = prompt(`${joint} 부위에 추가할 운동 이름을 입력하세요`);
            if (name && name.trim() !== '') {
                window.exerciseData[joint].push(name.trim());
                renderControls();
            }
        }

        window.deleteExercise = function(joint, index) {
            if(confirm("이 운동을 목록에서 삭제하시겠습니까?")) {
                const name = window.exerciseData[joint][index];
                const id = `${joint}_${name}`;
                window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
                
                window.exerciseData[joint].splice(index, 1);
                renderControls();
                renderPreview();
            }
        }

        window.handleCheck = function(checkbox) {
            const joint = checkbox.getAttribute('data-joint');
            const name = checkbox.getAttribute('data-name');
            const id = `${joint}_${name}`;

            if (checkbox.checked) {
                window.selectedExercises.push({ joint, name, id });
            } else {
                window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
            }
            renderPreview();
        }

        function renderControls() {
            const controls = document.getElementById('controls');
            controls.innerHTML = "";
            
            for (const [joint, exercises] of Object.entries(window.exerciseData)) {
                const div = document.createElement('div');
                div.className = 'category-box';
                
                // ★ 카테고리 제목 옆에 [+추가]와 [🗑️삭제] 버튼 나란히 배치 ★
                div.innerHTML = `
                    <div class="category-title">
                        <span>${joint}</span>
                        <div>
                            ${window.isAdminMode ? `<button class="admin-action-btn" onclick="addExercise('${joint}')">+ 추가</button>` : ''}
                            ${window.isAdminMode ? `<button class="admin-action-btn delete-btn" onclick="deleteCategory('${joint}')">🗑️ 삭제</button>` : ''}
                        </div>
                    </div>
                `;
                
                exercises.forEach((ex, idx) => {
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'exercise-item';
                    
                    const isChecked = window.selectedExercises.some(item => item.id === `${joint}_${ex}`) ? 'checked' : '';
                    
                    labelDiv.innerHTML = `
                        <label class="checkbox-label">
                            <input type="checkbox" class="ex-check" data-joint="${joint}" data-name="${ex}" onchange="handleCheck(this)" ${isChecked}> 
                            <span class="ex-name">${ex}</span>
                        </label>
                        ${window.isAdminMode ? `<button class="admin-del-btn" onclick="deleteExercise('${joint}', ${idx})">❌</button>` : ''}
                    `;
                    div.appendChild(labelDiv);
                });
                controls.appendChild(div);
            }
            
            const adminArea = document.getElementById('admin-area');
            adminArea.innerHTML = window.isAdminMode ? 
                `<button class="admin-btn save" onclick="saveExerciseList()">💾 변경된 목록 전체 저장</button>
                 <button class="admin-btn add" onclick="addCategory()">➕ 부위(카테고리) 추가</button>
                 <button class="admin-btn cancel" onclick="toggleAdmin()">취소</button>` :
                `<button class="admin-btn" onclick="toggleAdmin()">⚙️ 목록 수정 및 추가 (관리자)</button>`;
        }

        window.renderPreview = function() {
            const container = document.getElementById('page-container');
            const patientName = document.getElementById('patientNameInput').value || "________";
            container.innerHTML = "";

            if (window.selectedExercises.length === 0) {
                container.innerHTML = `<div class="a4-page no-print" style="display:flex; justify-content:center; align-items:center;"><p style="color: #999;">왼쪽에서 운동을 선택해 주세요.</p></div>`;
                return;
            }

            window.selectedExercises.forEach((item, index) => {
                const page = document.createElement('div');
                page.className = 'a4-page';
                let headerHtml = (index === 0) ? `<div class="page-header"><h1>재활 운동 가이드</h1><div class="patient-info">성함: <span>${patientName}</span><br>날짜: <span>${new Date().toLocaleDateString()}</span></div></div>` : `<div class="page-header empty-header"></div>`;
                
                const joint = item.joint;
                const name = item.name;
                const id = item.id;
                const desc = window.exerciseDescriptions[id] || `<strong>운동 목적:</strong> ${joint} 부위 기능 회복<br><br><strong>수행 방법:</strong> 10~15회씩 3세트 반복하세요.`;

                page.innerHTML = `
                    ${headerHtml}
                    <div class="page-content">
                        <img src="https://via.placeholder.com/600x600?text=${joint}+Exercise" class="exercise-img" alt="운동사진">
                        <div class="exercise-details">
                            <h3>[${joint}] ${name}</h3>
                            <div contenteditable="true" id="desc_${id}" class="editable-desc">${desc}</div>
                            <button class="no-print save-btn" onclick="saveDescription('${id}', document.getElementById('desc_${id}').innerHTML)">💾 설명 저장</button>
                        </div>
                    </div>
                `;
                container.appendChild(page);
            });
        }
        loadAllData();
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: #515659; }
        
        #sidebar { width: 300px; height: 100vh; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.3); overflow-y: auto; position: fixed; left: 0; top: 0; z-index: 100; box-sizing: border-box; }
        #sidebar h2 { font-size: 1.1rem; margin-bottom: 15px; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-top: 0; }
        
        #preview-area { margin-left: 300px; padding: 20px; width: calc(100% - 300px); display: flex; flex-direction: column; align-items: center; }

        .category-box { background: #f4f4f4; padding: 12px; margin-bottom: 12px; border-radius: 8px; }
        .category-title { font-weight: bold; color: #007bff; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 5px; font-size: 15px; }
        .exercise-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 2px 0; }
        
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; }
        .ex-name { font-size: 14px; color: #333; }
        
        /* 관리용 버튼들 */
        .admin-action-btn { background: #e9ecef; border: 1px solid #ccc; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; color: #333; }
        .admin-action-btn.delete-btn { color: #dc3545; margin-left: 4px; } /* 카테고리 삭제 버튼 빨간색 포인트 */
        .admin-del-btn { background: none; border: none; cursor: pointer; color: #dc3545; font-size: 12px; padding: 0 5px; }
        
        .admin-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .admin-btn.save { background: #007bff; color: white; border: none; font-weight: bold; }
        .admin-btn.add { background: #28a745; color: white; border: none; font-weight: bold; }
        .admin-btn.cancel { background: #f8f9fa; }
        .admin-btn:hover { filter: brightness(0.95); }

        .print-btn-fixed { position: fixed; top: 15px; right: 25px; z-index: 1000; padding: 10px 20px; background: #007bff; color: #fff; font-weight: bold; font-size: 14px; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .print-btn-fixed:hover { transform: scale(1.05); background: #0056b3; }

        .a4-page { width: 297mm; height: 210mm; background: #fff; margin-bottom: 20px; padding: 8mm 15mm 15mm 15mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .page-header { height: 12mm; border-bottom: 2.5px solid #333; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 3px; margin-bottom: 4mm; }
        .page-header.empty-header { border-bottom: none; height: 8mm; }
        .page-header h1 { margin: 0; font-size: 22pt; }
        .patient-info { text-align: right; font-size: 11pt; line-height: 1.3; }
        .patient-info span { border-bottom: 1px solid #000; padding: 0 5px; min-width: 50px; display: inline-block; }

        .page-content { flex: 1; display: flex; gap: 30px; align-items: stretch; overflow: hidden; border: 2px solid #ddd; padding: 20px; border-radius: 8px; box-sizing: border-box; background: #fdfdfd; }
        .exercise-img { width: 45%; border-radius: 8px; object-fit: contain; background: #fff; border: 1px solid #eee; }
        .exercise-details { width: 55%; display: flex; flex-direction: column; }
        
        .exercise-details h3 { margin: 0 0 15px 0; font-size: 18pt; color: #0056b3; border-bottom: 3px solid #0056b3; padding-bottom: 8px; }
        .editable-desc { flex: 1; font-size: 11pt; line-height: 1.8; color: #222; overflow-y: auto; padding: 15px; background: #fffbe6; border: 2px dashed #ffd666; border-radius: 8px; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            html, body { width: 100%; height: auto; margin: 0; padding: 0; background: white; }
            #sidebar, .print-btn-fixed, .save-btn, #admin-area { display: none !important; }
            #preview-area { margin: 0; padding: 0; width: 100%; }
            .a4-page { width: 100vw; height: 100vh; margin: 0; padding: 8mm 12mm; box-shadow: none; border: none; page-break-after: always; }
            #page-container .a4-page:last-child { page-break-after: auto !important; }
            .no-print { display: none !important; }
            .page-content { border: 2px solid #000; background: none; }
            .editable-desc { background: none; border: none; padding: 0; overflow: hidden; height: auto; font-size: 11.5pt; }
        }

        .save-btn { margin-top: 15px; padding: 10px 15px; background: #52c41a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 10pt; font-weight: bold; }
    </style>
</head>
<body>
    <button class="print-btn-fixed no-print" onclick="window.print()">🖨️ 가이드 인쇄</button>
    
    <div id="sidebar">
        <h2>재활 설정</h2>
        <input type="text" id="patientNameInput" placeholder="환자 성함 입력" oninput="renderPreview()" style="width:100%; padding:10px; margin-bottom:15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        
        <div id="controls"></div>
        <div id="admin-area" class="no-print" style="margin-top: 20px;"></div>
    </div>
    
    <div id="preview-area">
        <div id="page-container"></div>
    </div>
</body>
</html>
