<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재활 시스템 - 방탄 사진 복붙 버전</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT5WAkV3v5OSRxC34aVDeyfeDCQWCWHTE",
            authDomain: "ptjw-1020.firebaseapp.com",
            projectId: "ptjw-1020",
            storageBucket: "ptjw-1020.firebasestorage.app",
            messagingSenderId: "320104083355",
            appId: "1:320104083355:web:9e979809a1bbd46807fb3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.exerciseData = {};
        window.exerciseDescriptions = {};
        window.exerciseImages = {}; 
        window.isAdminMode = false; 
        window.selectedExercises = []; 

        async function loadAllData() {
            try {
                const listRef = doc(db, "settings", "exerciseList");
                const listSnap = await getDoc(listRef);
                window.exerciseData = listSnap.exists() ? listSnap.data() : {"안내": ["운동을 추가해 주세요"]};

                const descRef = doc(db, "settings", "exerciseDescriptions");
                const descSnap = await getDoc(descRef);
                if (descSnap.exists()) window.exerciseDescriptions = descSnap.data();

                const imgRef = doc(db, "settings", "exerciseImages");
                const imgSnap = await getDoc(imgRef);
                if (imgSnap.exists()) window.exerciseImages = imgSnap.data();
            } catch (e) { console.error(e); }
            renderControls();
            renderPreview();
        }

        window.saveExerciseList = async function() {
            try {
                const categoryTitles = document.querySelectorAll('.category-title-text');
                const newData = {};
                categoryTitles.forEach(titleSpan => {
                    const oldKey = titleSpan.getAttribute('data-old-key');
                    const newKey = titleSpan.innerText.trim();
                    newData[newKey] = window.exerciseData[oldKey] || [];
                });
                window.exerciseData = newData;
                await setDoc(doc(db, "settings", "exerciseList"), window.exerciseData);
                alert("목록이 저장되었습니다!");
                window.isAdminMode = false;
                renderControls();
            } catch (e) { alert("저장 실패!"); }
        }

        window.saveDescription = async function(id, text) {
            try {
                await setDoc(doc(db, "settings", "exerciseDescriptions"), { [id]: text }, { merge: true });
                window.exerciseDescriptions[id] = text;
                alert("설명이 저장되었습니다!");
            } catch (e) { alert("저장 실패!"); }
        }

        window.saveImageUrl = async function(id) {
            let newUrl = prompt("이미지 주소를 입력하세요:", window.exerciseImages[id] || "");
            if (newUrl !== null) {
                // 방탄 코드: 사용자가 HTML 코드를 통째로 복붙해도 사진 주소만 쏙 빼냅니다!
                const srcMatch = newUrl.match(/src=["'](https?:\/\/[^"']+)["']/);
                if (srcMatch) {
                    newUrl = srcMatch[1]; 
                } else {
                    const urlMatch = newUrl.match(/https?:\/\/[^"'\s>]+/);
                    if (urlMatch) newUrl = urlMatch[0]; 
                }

                try {
                    await setDoc(doc(db, "settings", "exerciseImages"), { [id]: newUrl }, { merge: true });
                    window.exerciseImages[id] = newUrl;
                    alert("사진이 성공적으로 저장되었습니다!");
                    renderPreview();
                } catch (e) { alert("저장 실패!"); }
            }
        }

        window.toggleAdmin = function() { window.isAdminMode = !window.isAdminMode; renderControls(); renderPreview(); }

        window.addCategory = function() {
            const name = prompt("부위 이름:");
            if (name && !window.exerciseData[name]) { window.exerciseData[name] = []; renderControls(); }
        }

        window.deleteCategory = function(joint) {
            if(confirm(`[${joint}] 삭제?`)) { delete window.exerciseData[joint]; renderControls(); renderPreview(); }
        }

        window.addExercise = function(joint) {
            const name = prompt("운동 이름:");
            if (name) { window.exerciseData[joint].push(name); renderControls(); }
        }

        window.deleteExercise = function(joint, index) {
            if(confirm("삭제?")) { window.exerciseData[joint].splice(index, 1); renderControls(); renderPreview(); }
        }

        window.handleCheck = function(checkbox) {
            const joint = checkbox.getAttribute('data-joint');
            const name = checkbox.getAttribute('data-name');
            const id = `${joint}_${name}`;
            if (checkbox.checked) window.selectedExercises.push({ joint, name, id });
            else window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id);
            renderPreview();
        }

        function renderControls() {
            const controls = document.getElementById('controls');
            controls.innerHTML = "";
            for (const [joint, exercises] of Object.entries(window.exerciseData)) {
                const div = document.createElement('div');
                div.className = 'category-box';
                div.innerHTML = `
                    <div class="category-title">
                        <span class="category-title-text" contenteditable="${window.isAdminMode}" data-old-key="${joint}">${joint}</span>
                        ${window.isAdminMode ? `<div><button onclick="addExercise('${joint}')">+</button><button onclick="deleteCategory('${joint}')">🗑️</button></div>` : ''}
                    </div>
                `;
                exercises.forEach((ex, idx) => {
                    const item = document.createElement('div');
                    item.className = 'exercise-item';
                    const id = `${joint}_${ex}`;
                    const isChecked = window.selectedExercises.some(s => s.id === id) ? 'checked' : '';
                    item.innerHTML = `
                        <label><input type="checkbox" data-joint="${joint}" data-name="${ex}" onchange="handleCheck(this)" ${isChecked}> ${ex}</label>
                        ${window.isAdminMode ? `<button onclick="deleteExercise('${joint}', ${idx})">❌</button>` : ''}
                    `;
                    div.appendChild(item);
                });
                controls.appendChild(div);
            }
            document.getElementById('admin-area').innerHTML = window.isAdminMode ? 
                `<button class="admin-btn save" onclick="saveExerciseList()">💾 전체 저장</button>
                 <button class="admin-btn" onclick="addCategory()">➕ 부위 추가</button>
                 <button class="admin-btn" onclick="toggleAdmin()">취소</button>` :
                `<button class="admin-btn" onclick="toggleAdmin()">⚙️ 목록 수정(관리자)</button>`;
        }

        window.renderPreview = function() {
            const container = document.getElementById('page-container');
            const pName = document.getElementById('pIn').value || "________";
            const tName = document.getElementById('tIn').value || "________";
            const total = window.selectedExercises.length;
            container.innerHTML = "";

            if (total === 0) {
                container.innerHTML = `<div class="a4-page"><p style="color:#ccc; text-align:center; margin-top:100px;">운동을 선택하세요.</p></div>`;
                return;
            }

            window.selectedExercises.forEach((item, idx) => {
                const page = document.createElement('div');
                page.className = 'a4-page';
                const id = item.id;
                const desc = window.exerciseDescriptions[id] || "설명을 입력하세요.";
                const imgSrc = window.exerciseImages[id] || "";
                
                const imgHtml = imgSrc ? `<img src="${imgSrc}" class="exercise-img">` : `<div class="no-img-placeholder">이미지를 등록해 주세요</div>`;

                page.innerHTML = `
                    <div class="page-header">
                        <h1>재활 운동 가이드</h1>
                        <div class="patient-info">환자: <b>${pName}</b>님 / 담당: <b>${tName}</b></div>
                    </div>
                    <div class="page-content">
                        <div class="img-wrap">
                            ${imgHtml}
                            ${window.isAdminMode ? `<button class="no-print img-edit-btn" onclick="saveImageUrl('${id}')">🖼️ 사진수정</button>` : ''}
                        </div>
                        <div class="exercise-details">
                            <h3>[${item.joint}] ${item.name}</h3>
                            <div contenteditable="true" id="desc_${id}" class="editable-desc">${desc}</div>
                            <button class="no-print save-btn" onclick="saveDescription('${id}', document.getElementById('desc_${id}').innerHTML)">💾 설명저장</button>
                        </div>
                    </div>
                    <div class="page-num-indicator">${idx + 1} / ${total}</div>
                `;
                container.appendChild(page);
            });
        }
        loadAllData();
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: #515659; }
        #sidebar { width: 300px; height: 100vh; background: #fff; padding: 20px; position: fixed; left: 0; top: 0; box-sizing: border-box; overflow-y: auto; z-index: 10; }
        #preview-area { margin-left: 300px; padding: 20px; width: calc(100% - 300px); display: flex; flex-direction: column; align-items: center; }
        .category-box { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .category-title { font-weight: bold; color: #007bff; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .exercise-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 3px; }
        .admin-btn { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; }
        .admin-btn.save { background: #007bff; color: #fff; border: none; }
        
        .a4-page { width: 297mm; height: 210mm; background: #fff; margin-bottom: 20px; padding: 15mm; box-sizing: border-box; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .page-header { border-bottom: 3px solid #333; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 10mm; }
        .page-header h1 { margin: 0; font-size: 28pt; }
        .page-content { flex: 1; display: flex; gap: 30px; overflow: hidden; }
        
        .img-wrap { width: 65%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #eee; }
        .exercise-img { max-width: 100%; max-height: 100%; object-fit: contain; } 
        .no-img-placeholder { color: #ccc; font-size: 14px; }
        
        .exercise-details { width: 35%; display: flex; flex-direction: column; }
        .exercise-details h3 { margin: 0 0 15px 0; font-size: 22pt; color: #0056b3; }
        .editable-desc { flex: 1; font-size: 12pt; line-height: 1.8; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; overflow-y: auto; }
        
        .page-num-indicator { position: absolute; bottom: 10mm; right: 15mm; font-size: 10pt; color: #aaa; }
        .img-edit-btn { position: absolute; bottom: 10px; left: 10px; padding: 5px; background: rgba(0,0,0,0.5); color: #fff; border: none; cursor: pointer; border-radius: 4px; }
        .print-btn-fixed { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 20px; cursor: pointer; z-index: 100; font-weight: bold; }
        .save-btn { margin-top: 10px; padding: 8px; background: #52c41a; color: white; border: none; border-radius: 5px; cursor: pointer; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            #sidebar, .print-btn-fixed, .no-print { display: none !important; }
            #preview-area { margin: 0; padding: 0; width: 100%; }
            .a4-page { width: 100vw; height: 100vh; margin: 0; box-shadow: none; page-break-after: always; }
            .img-wrap { border: none; background: none; }
            .no-img-placeholder { display: none; } 
        }
    </style>
</head>
<body>
    <button class="print-btn-fixed no-print" onclick="window.print()">🖨️ 인쇄하기</button>
    <div id="sidebar">
        <h3>설정</h3>
        <input type="text" id="pIn" placeholder="환자 성함" oninput="renderPreview()" style="width:100%; padding:8px; margin-bottom:10px;">
        <input type="text" id="tIn" placeholder="담당 치료사" oninput="renderPreview()" style="width:100%; padding:8px; margin-bottom:20px;">
        <div id="controls"></div>
        <div id="admin-area"></div>
    </div>
    <div id="preview-area"><div id="page-container"></div></div>
</body>
</html>
