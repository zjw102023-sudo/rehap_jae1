<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재활 시스템 - 실무 최적화 (검색, 페이징, 매크로)</title>
    
    <style id="dynamic-print-style">
        @media print { @page { size: landscape; margin: 0; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT5WAkV3v5OSRxC34aVDeyfeDCQWCWHTE",
            authDomain: "ptjw-1020.firebaseapp.com",
            projectId: "ptjw-1020",
            storageBucket: "ptjw-1020.firebasestorage.app",
            messagingSenderId: "320104083355",
            appId: "1:320104083355:web:9e979809a1bbd46807fb3e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.therapistDB = { "0000": { name: "최고관리자", pw: "0000" } }; 
        window.exerciseData = {};
        window.exerciseDescriptions = {}; 
        window.exerciseImages = {}; 
        window.exerciseVideos = {}; 
        window.patientDB = {}; 
        window.macroList = ["10회 x 3세트 진행합니다.", "15회 x 3세트 진행합니다.", "🚨 주의: 통증 발생 시 즉시 중단하세요."]; // 🌟 전역 매크로 배열
        window.isAdminMode = false; 
        window.selectedExercises = []; 
        window.keyMigrations = {}; 
        window.currentTab = 'prescription';

        window.onload = async function() {
            document.getElementById('global-loader').style.display = 'flex';
            await loadAllData(); 
            document.getElementById('global-loader').style.display = 'none';

            const savedName = sessionStorage.getItem('loggedInName');
            const loginID = sessionStorage.getItem('loggedInID');
            
            if (savedName && loginID) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'flex';
                document.querySelector('.top-right-controls').style.display = 'flex';
                document.getElementById('main-app-container').style.display = 'flex';
                
                document.getElementById('logged-in-user').innerText = savedName;
                if (loginID === '0000') {
                    document.getElementById('tab-admin').style.display = 'flex';
                }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        async function loadAllData() {
            try {
                const tSnap = await getDoc(doc(db, "settings", "therapists"));
                if (tSnap.exists()) {
                    let rawT = tSnap.data(); let migratedT = {};
                    for(let k in rawT) { migratedT[k] = (typeof rawT[k] === 'string') ? { name: rawT[k], pw: k } : rawT[k]; }
                    window.therapistDB = migratedT;
                }
                if (!window.therapistDB["0000"]) window.therapistDB["0000"] = { name: "최고관리자", pw: "0000" };

                const pSnap = await getDoc(doc(db, "settings", "patients"));
                if (pSnap.exists()) window.patientDB = pSnap.data();

                const listSnap = await getDoc(doc(db, "settings", "exerciseList"));
                let rawData = listSnap.exists() ? listSnap.data() : {};
                const requiredCategories = ["목", "어깨", "팔꿈치", "손목", "허리", "고관절", "무릎", "발목"];
                requiredCategories.forEach(cat => { if (!rawData[cat]) rawData[cat] = { "스트레칭": [], "운동": [] }; });
                for (let key in rawData) { if (Array.isArray(rawData[key])) { rawData[key] = { "스트레칭": rawData[key], "운동": [] }; } }
                window.exerciseData = rawData;

                const descSnap = await getDoc(doc(db, "settings", "exerciseDescriptions"));
                if (descSnap.exists()) window.exerciseDescriptions = descSnap.data();
                
                const imgSnap = await getDoc(doc(db, "settings", "exerciseImages"));
                if (imgSnap.exists()) {
                    let loadedImgs = imgSnap.data();
                    for (let k in loadedImgs) { if (typeof loadedImgs[k] === 'string') { loadedImgs[k] = [loadedImgs[k]]; } }
                    window.exerciseImages = loadedImgs;
                }

                const vidSnap = await getDoc(doc(db, "settings", "exerciseVideos"));
                if (vidSnap.exists()) window.exerciseVideos = vidSnap.data();

                // 🌟 매크로 데이터 로드
                const macSnap = await getDoc(doc(db, "settings", "macros"));
                if (macSnap.exists() && macSnap.data().list) {
                    window.macroList = macSnap.data().list;
                }

            } catch (e) { console.error(e); }
            renderControls(); renderPatientList(); renderPreview(); renderMacroList();
        }

        window.attemptLogin = function() {
            const idInput = document.getElementById('emp-id').value.trim();
            const pwInput = document.getElementById('emp-pw').value.trim();
            if (window.therapistDB[idInput] && window.therapistDB[idInput].pw === pwInput) {
                sessionStorage.setItem('loggedInID', idInput);
                sessionStorage.setItem('loggedInName', window.therapistDB[idInput].name);
                location.reload(); 
            } else { alert("사원번호 또는 비밀번호가 일치하지 않습니다."); }
        };

        window.logout = function() { sessionStorage.clear(); location.reload(); };

        window.switchTab = async function(tab) {
            if (window.currentTab === 'management' && tab !== 'management') {
                syncDOMtoData(); await executeMigrations(); await setDoc(doc(db, "settings", "exerciseList"), window.exerciseData);
            }
            window.currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');

            if (tab === 'admin') {
                document.getElementById('main-app-container').style.display = 'none';
                document.getElementById('admin-app-container').style.display = 'flex';
                renderTherapistList();
            } else {
                document.getElementById('admin-app-container').style.display = 'none';
                document.getElementById('main-app-container').style.display = 'flex';
                if (tab === 'management') {
                    window.isAdminMode = true;
                    document.getElementById('patient-panel').style.display = 'none';
                    document.getElementById('sidebar-patient-inputs').style.display = 'none';
                    document.getElementById('macro-management-section').style.display = 'block'; // 매크로 관리 패널 활성화
                    document.getElementById('preview-area').style.right = '0'; 
                } else {
                    window.isAdminMode = false;
                    document.getElementById('patient-panel').style.display = 'block';
                    document.getElementById('sidebar-patient-inputs').style.display = 'block';
                    document.getElementById('macro-management-section').style.display = 'none';
                    document.getElementById('preview-area').style.right = '340px'; 
                }
                renderControls(); renderPreview();
            }
        };

        async function executeMigrations() {
            let metaChanged = false; let patientChanged = false;
            for (let oldKey in window.keyMigrations) {
                let newKey = window.keyMigrations[oldKey];
                if (window.exerciseDescriptions[oldKey] !== undefined) { window.exerciseDescriptions[newKey] = window.exerciseDescriptions[oldKey]; delete window.exerciseDescriptions[oldKey]; metaChanged = true; }
                if (window.exerciseImages[oldKey] !== undefined) { window.exerciseImages[newKey] = window.exerciseImages[oldKey]; delete window.exerciseImages[oldKey]; metaChanged = true; }
                if (window.exerciseVideos[oldKey] !== undefined) { window.exerciseVideos[newKey] = window.exerciseVideos[oldKey]; delete window.exerciseVideos[oldKey]; metaChanged = true; }
                window.selectedExercises = window.selectedExercises.map(ex => {
                    if (ex.id === oldKey) { const parts = newKey.split('_'); return { joint: parts[0], name: parts[1], id: newKey, customDesc: ex.customDesc }; } return ex;
                });
            }
            for (let pKey in window.patientDB) {
                let pExChanged = false;
                window.patientDB[pKey].exercises = window.patientDB[pKey].exercises.map(ex => {
                    if (window.keyMigrations[ex.id]) {
                        const newKey = window.keyMigrations[ex.id]; const parts = newKey.split('_'); pExChanged = true;
                        return { joint: parts[0], name: parts[1], id: newKey, customDesc: ex.customDesc };
                    } return ex;
                });
                if (pExChanged) patientChanged = true;
            }
            if(metaChanged) { await setDoc(doc(db, "settings", "exerciseDescriptions"), window.exerciseDescriptions); await setDoc(doc(db, "settings", "exerciseImages"), window.exerciseImages); await setDoc(doc(db, "settings", "exerciseVideos"), window.exerciseVideos); }
            if (patientChanged) { await setDoc(doc(db, "settings", "patients"), window.patientDB); }
            window.keyMigrations = {};
        }

        window.addTherapist = async function() {
            const id = prompt("사원번호:"); if (!id) return;
            if (window.therapistDB[id]) return alert("이미 존재하는 사원번호입니다.");
            const name = prompt("이름:"); if (!name) return;
            const pw = prompt("초기 비밀번호 설정:"); if (!pw) return;
            window.therapistDB[id] = { name: name, pw: pw };
            await setDoc(doc(db, "settings", "therapists"), window.therapistDB); renderTherapistList();
        };

        window.resetTherapistPw = async function(id) {
            const newPw = prompt(`[${window.therapistDB[id].name}] 치료사님의 새 비밀번호를 입력하세요:`);
            if (newPw) { window.therapistDB[id].pw = newPw; await setDoc(doc(db, "settings", "therapists"), window.therapistDB); alert("비밀번호가 성공적으로 변경되었습니다."); }
        };

        window.deleteTherapist = async function(id) {
            if (id === '0000') return alert("삭제 불가");
            if (confirm("삭제하시겠습니까?")) { delete window.therapistDB[id]; await setDoc(doc(db, "settings", "therapists"), window.therapistDB); renderTherapistList(); }
        };

        function renderTherapistList() {
            const listDiv = document.getElementById('t-list'); listDiv.innerHTML = "";
            for (const [id, data] of Object.entries(window.therapistDB)) { 
                if (id !== '0000') {
                    listDiv.innerHTML += `<div class="t-item"><span>${id} : ${data.name}</span> <div><button onclick="resetTherapistPw('${id}')" style="background:#ffc107; color:#000; margin-right:5px;">PW변경</button><button onclick="deleteTherapist('${id}')">삭제</button></div></div>`; 
                }
            }
        }

        window.setPrintMode = function(mode) {
            const styleTag = document.getElementById('dynamic-print-style');
            if (mode === 'portrait') {
                document.body.className = 'portrait-mode'; styleTag.innerHTML = '@media print { @page { size: portrait; margin: 0; } }';
                document.getElementById('mode-portrait-btn').classList.add('active'); document.getElementById('mode-landscape-btn').classList.remove('active');
            } else {
                document.body.className = 'landscape-mode'; styleTag.innerHTML = '@media print { @page { size: landscape; margin: 0; } }';
                document.getElementById('mode-landscape-btn').classList.add('active'); document.getElementById('mode-portrait-btn').classList.remove('active');
            }
        };

        window.savePatientRoutine = async function() {
            const pName = document.getElementById('pIn').value.trim(); const chartID = document.getElementById('chartIn').value.trim();
            const pMemo = document.getElementById('pMemo').value.trim(); const loggedInID = sessionStorage.getItem('loggedInID');
            if (!pName || !chartID) return alert("성함과 병록번호 필수!"); if (window.selectedExercises.length === 0) return alert("운동 선택 필수!");
            const routineData = window.selectedExercises.map(ex => { const descBox = document.getElementById(`desc_${ex.id}`); return { ...ex, customDesc: descBox ? descBox.innerHTML : "" }; });
            const saveKey = `${chartID}_${pName}_${Date.now()}`; 
            window.patientDB[saveKey] = { chartID, pName, memo: pMemo, exercises: routineData, therapistName: sessionStorage.getItem('loggedInName'), therapistID: loggedInID, date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            try { await setDoc(doc(db, "settings", "patients"), window.patientDB); alert("저장되었습니다."); renderPatientList(); } catch (e) { alert("실패!"); }
        };

        window.loadPatientRoutine = function(key) {
            const pData = window.patientDB[key];
            document.getElementById('pIn').value = pData.pName; document.getElementById('chartIn').value = pData.chartID; document.getElementById('pMemo').value = pData.memo || ""; 
            window.selectedExercises = [...pData.exercises]; renderControls(); renderPreview();  
        };

        window.startNewRoutine = function(pName, chartID) {
            document.getElementById('pIn').value = pName; document.getElementById('chartIn').value = chartID; document.getElementById('pMemo').value = ""; 
            window.selectedExercises = []; renderControls(); renderPreview();  
        };

        window.resetSelection = function() {
            if (window.selectedExercises.length === 0) return;
            if (confirm("체크된 모든 운동을 해제하시겠습니까?")) { window.selectedExercises = []; renderControls(); renderPreview(); }
        };

        window.saveMasterDescription = async function(id, text) {
            await setDoc(doc(db, "settings", "exerciseDescriptions"), { [id]: text }, { merge: true });
            window.exerciseDescriptions[id] = text; alert("공용 데이터(원본)가 업데이트되었습니다.");
        };

        window.addCategory = function() { syncDOMtoData(); const n = prompt("부위명:"); if(n && !window.exerciseData[n]) { window.exerciseData[n] = {"스트레칭": [], "운동": []}; renderControls(); } }
        window.deleteCategory = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); if(confirm(`[${catTitle}] 삭제?`)) { delete window.exerciseData[catTitle]; removeDeletedFromSelection(); renderControls(); renderPreview(); } }
        window.addFolder = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const f = prompt(`새 폴더명:`); if (f && !window.exerciseData[catTitle][f]) { window.exerciseData[catTitle][f] = []; renderControls(); } }
        window.deleteFolder = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); if(confirm(`삭제?`)) { delete window.exerciseData[catTitle][fTitle]; removeDeletedFromSelection(); renderControls(); renderPreview(); } }
        window.addExercise = function(btn) { syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); const n = prompt(`운동명:`); if(n) { window.exerciseData[catTitle][fTitle].push(n); renderControls(); } }
        
        // 🌟 전역 매크로 추가/삭제 로직 🌟
        window.addGlobalMacro = async function() {
            const text = prompt("새로운 매크로 문구를 입력하세요:");
            if(text) {
                window.macroList.push(text);
                await setDoc(doc(db, "settings", "macros"), { list: window.macroList });
                renderMacroList(); renderPreview();
            }
        };
        window.deleteGlobalMacro = async function(idx) {
            if(confirm("이 매크로를 삭제하시겠습니까?")) {
                window.macroList.splice(idx, 1);
                await setDoc(doc(db, "settings", "macros"), { list: window.macroList });
                renderMacroList(); renderPreview();
            }
        };
        function renderMacroList() {
            const container = document.getElementById('macro-edit-list');
            if(!container) return;
            container.innerHTML = "";
            window.macroList.forEach((m, idx) => {
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:#f8faff; border:1px solid #cce5ff; padding:8px; margin-bottom:5px; border-radius:4px; font-size:12px;">
                        <span style="flex:1;">${m}</span>
                        <button onclick="deleteGlobalMacro(${idx})" style="background:none; border:none; color:#e63946; cursor:pointer; font-weight:bold;">❌</button>
                    </div>
                `;
            });
        }

        function removeDeletedFromSelection() {
            window.selectedExercises = window.selectedExercises.filter(ex => {
                if(window.exerciseData[ex.joint]) { for(let folder in window.exerciseData[ex.joint]) { if(window.exerciseData[ex.joint][folder].includes(ex.name)) return true; } } return false;
            });
        }

        window.deleteExercise = function(btn, exName) { 
            syncDOMtoData(); const catTitle = btn.closest('.category-box').querySelector('.category-title-text').innerText.trim(); const fTitle = btn.closest('.folder-box').querySelector('.folder-title-text').innerText.trim(); 
            window.exerciseData[catTitle][fTitle] = window.exerciseData[catTitle][fTitle].filter(e => e !== exName); removeDeletedFromSelection(); renderControls(); renderPreview(); 
        }

        // 드래그 앤 드롭 로직
        window.dragStart = function(e, joint, name) {
            e.dataTransfer.setData('joint', joint); e.dataTransfer.setData('name', name);
        };
        window.allowDrop = function(e) { e.preventDefault(); };
        window.dropEmpty = function(e) {
            e.preventDefault(); const joint = e.dataTransfer.getData('joint'); const name = e.dataTransfer.getData('name');
            if (joint && name) addExerciseToSelection(joint, name, window.selectedExercises.length);
        };
        window.handleDragOverPage = function(e) {
            e.preventDefault(); const rect = e.currentTarget.getBoundingClientRect(); const isTopHalf = (e.clientY - rect.top) < (rect.height / 2);
            if(isTopHalf) { e.currentTarget.classList.add('drag-over-top'); e.currentTarget.classList.remove('drag-over-bottom'); } 
            else { e.currentTarget.classList.add('drag-over-bottom'); e.currentTarget.classList.remove('drag-over-top'); }
        };
        window.handleDragLeavePage = function(e) { e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom'); };
        window.dropOnPage = function(e, targetIdx) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
            const joint = e.dataTransfer.getData('joint'); const name = e.dataTransfer.getData('name');
            if (!joint || !name) return;
            const rect = e.currentTarget.getBoundingClientRect(); const isTopHalf = (e.clientY - rect.top) < (rect.height / 2);
            let insertIndex = isTopHalf ? targetIdx : targetIdx + 1;
            addExerciseToSelection(joint, name, insertIndex);
        };

        function addExerciseToSelection(joint, name, insertIndex) {
            const id = `${joint}_${name}`; const existingIndex = window.selectedExercises.findIndex(ex => ex.id === id);
            let customDesc = window.exerciseDescriptions[id] || "방법을 입력하세요.";
            if (existingIndex !== -1) { customDesc = window.selectedExercises[existingIndex].customDesc; window.selectedExercises.splice(existingIndex, 1); if (existingIndex < insertIndex) insertIndex--; }
            const newItem = { joint: joint, name: name, id: id, customDesc: customDesc }; window.selectedExercises.splice(insertIndex, 0, newItem);
            renderControls(); renderPreview();
        }

        window.handleCheck = function(c) {
            const j = c.getAttribute('data-joint'), n = c.getAttribute('data-name'), id = `${j}_${n}`;
            if (c.checked) { if(!window.selectedExercises.some(ex => ex.id === id)) { addExerciseToSelection(j, n, window.selectedExercises.length); } } 
            else { window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id); renderControls(); renderPreview(); }
        }

        window.removeExerciseFromPreview = function(id) { window.selectedExercises = window.selectedExercises.filter(ex => ex.id !== id); renderControls(); renderPreview(); };
        window.setVideoLink = async function(id) { const currentUrl = window.exerciseVideos[id] || ""; const url = prompt("유튜브(영상) 주소:", currentUrl); if (url !== null) { try { await setDoc(doc(db, "settings", "exerciseVideos"), { [id]: url }, { merge: true }); window.exerciseVideos[id] = url; renderPreview(); } catch(e) { alert("저장 실패!"); } } };
        window.addMacro = function(id, text) { const descBox = document.getElementById(`desc_${id}`); descBox.innerHTML += (descBox.innerHTML.trim() === '' ? '' : '<br>') + `▶ ${text}`; };

        window.processAndSaveImage = function(file, id) {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image(); img.src = event.target.result;
                img.onload = async function() {
                    const canvas = document.createElement('canvas'); let w = img.width, h = img.height; const MAX = 1000; 
                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const base64 = canvas.toDataURL('image/jpeg', 0.85); 
                    let imgs = window.exerciseImages[id] || []; if (typeof imgs === 'string') imgs = [imgs]; imgs.push(base64);
                    try { await setDoc(doc(db, "settings", "exerciseImages"), { [id]: imgs }, { merge: true }); window.exerciseImages[id] = imgs; renderPreview(); } catch (e) { alert("⚠️ 저장 실패! 데이터베이스 용량(1MB) 초과"); }
                }
            };
        }
        window.clearImages = async function(id) { if (confirm("전체 삭제?")) { await setDoc(doc(db, "settings", "exerciseImages"), { [id]: [] }, { merge: true }); window.exerciseImages[id] = []; renderPreview(); } }
        window.handlePaste = function(e, id) { if(!window.isAdminMode) return; const items = (e.clipboardData || e.originalEvent.clipboardData).items; for (let i in items) { if (items[i].kind === 'file' && items[i].type.startsWith('image/')) { processAndSaveImage(items[i].getAsFile(), id); break; } } }

        // 🌟 환자 목록 페이징(접기) 기능 🌟
        window.renderPatientList = function() {
            const pListDiv = document.getElementById('patient-list-container'); pListDiv.innerHTML = "";
            const currentID = sessionStorage.getItem('loggedInID');
            const grouped = {};
            const query = document.getElementById('searchPatientIn')?.value.toLowerCase().trim() || "";

            Object.entries(window.patientDB).forEach(([key, d]) => {
                if (currentID !== '0000' && d.therapistID !== currentID) return;
                
                // 🌟 검색 필터 적용
                if (query && !d.pName.toLowerCase().includes(query) && !d.chartID.toLowerCase().includes(query)) return;

                const pKey = `${d.chartID}_${d.pName}`;
                if (!grouped[pKey]) grouped[pKey] = [];
                grouped[pKey].push({ key, ...d });
            });

            for (const [pKey, records] of Object.entries(grouped)) {
                const sortedRecords = records.sort((a,b) => b.key.split('_')[2] - a.key.split('_')[2]); 
                const pName = sortedRecords[0].pName; const chartID = sortedRecords[0].chartID;
                
                const groupDiv = document.createElement('div'); groupDiv.className = 'patient-group';
                
                // 🌟 과거 기록 분리 로직 (최대 3개만 기본 노출)
                const recentRecords = sortedRecords.slice(0, 3);
                const olderRecords = sortedRecords.slice(3);

                let listHtml = recentRecords.map(r => `
                    <div class="visit-record">
                        <div class="visit-date">📅 ${r.date} ${r.memo ? '<span style="color:#005b96;font-weight:bold;">[메모있음]</span>' : ''}</div>
                        <div class="p-card-actions">
                            <button class="p-btn-load" onclick="loadPatientRoutine('${r.key}')">불러오기</button>
                            <button class="p-btn-del" onclick="deletePatientRoutine('${r.key}')">삭제</button>
                        </div>
                    </div>`).join('');
                
                if(olderRecords.length > 0) {
                    listHtml += `
                        <button class="show-more-btn" onclick="this.nextElementSibling.style.display='block'; this.style.display='none';">⬇ 이전 방문기록 ${olderRecords.length}개 더보기</button>

                                <div class="p-card-actions">
                                    <button class="p-btn-load" onclick="loadPatientRoutine('${r.key}')">불러오기</button>
                                    <button class="p-btn-del" onclick="deletePatientRoutine('${r.key}')">삭제</button>
                                </div>
                            </div>`).join('')}
                        </div>
                    `;
                }

                groupDiv.innerHTML = `
                    <div class="patient-group-title">
                        <div onclick="this.parentElement.nextElementSibling.classList.toggle('active')" style="flex:1; cursor:pointer;"><strong>👤 ${pName}</strong> <span style="font-size:11px;">(#${chartID})</span></div>
                        <button class="new-routine-btn" onclick="startNewRoutine('${pName}', '${chartID}')" title="새 처방 시작">➕</button>
                    </div>
                    <div class="patient-group-content">${listHtml}</div>`;
                pListDiv.appendChild(groupDiv);
            }
        }

        window.searchPatients = function() { renderPatientList(); };

        window.filterExercises = function() {
            const keyword = document.getElementById('searchEx').value.toLowerCase().trim();
            if (keyword === "") {
                document.querySelectorAll('.exercise-item').forEach(item => item.style.display = 'flex');
                document.querySelectorAll('.folder-box').forEach(box => box.style.display = 'block');
                document.querySelectorAll('.category-box').forEach(box => box.style.display = 'block');
                return;
            }
            document.querySelectorAll('.exercise-item').forEach(item => { item.style.display = item.innerText.toLowerCase().includes(keyword) ? 'flex' : 'none'; });
            document.querySelectorAll('.folder-box').forEach(box => { const visible = Array.from(box.querySelectorAll('.exercise-item')).some(item => item.style.display !== 'none'); box.style.display = visible ? 'block' : 'none'; });
            document.querySelectorAll('.category-box').forEach(box => { const visible = Array.from(box.querySelectorAll('.folder-box')).some(f => f.style.display !== 'none'); box.style.display = visible ? 'block' : 'none'; });
        };

        function syncDOMtoData() {
            if (!window.isAdminMode) return;
            const categories = document.querySelectorAll('.category-box'); const newData = {}; window.keyMigrations = {}; 
            categories.forEach(cat => {
                const catTitle = cat.querySelector('.category-title-text').innerText.trim(); const oldCat = cat.querySelector('.category-title-text').getAttribute('data-old-key');
                if (!catTitle) return; newData[catTitle] = {};
                const folders = cat.querySelectorAll('.folder-box');
                folders.forEach(fld => {
                    const fTitle = fld.querySelector('.folder-title-text').innerText.trim();
                    if (!fTitle) return; let exercises = [];
                    fld.querySelectorAll('.exercise-title-text').forEach(span => {
                        const exName = span.innerText.trim(); const oldEx = span.getAttribute('data-old-ex-key');
                        if(exName) {
                            exercises.push(exName); const oldFullKey = `${oldCat}_${oldEx}`; const newFullKey = `${catTitle}_${exName}`;
                            if (oldFullKey !== newFullKey) { window.keyMigrations[oldFullKey] = newFullKey; }
                        }
                    }); newData[catTitle][fTitle] = exercises;
                });
            }); window.exerciseData = newData;
        }

        function renderControls() {
            const c = document.getElementById('controls'); c.innerHTML = "";
            const fixedOrder = ["목", "어깨", "팔꿈치", "손목", "허리", "고관절", "무릎", "발목"];
            const currentCategories = Object.keys(window.exerciseData).sort((a, b) => {
                const iA = fixedOrder.indexOf(a); const iB = fixedOrder.indexOf(b);
                if (iA !== -1 && iB !== -1) return iA - iB; if (iA !== -1) return -1; if (iB !== -1) return 1; return a.localeCompare(b); 
            });

            for (const joint of currentCategories) {
                const folders = window.exerciseData[joint];
                const div = document.createElement('div'); div.className = 'category-box';
                div.innerHTML = `<div class="category-title"><span class="category-title-text" contenteditable="${window.isAdminMode}" data-old-key="${joint}" style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:0 4px; border-radius:4px;' : ''}">${joint}</span>${window.isAdminMode ? `<div><button onclick="addFolder(this)">📁+</button> <button onclick="deleteCategory(this)">🗑️</button></div>` : ''}</div>`;
                for (const [folder, exercises] of Object.entries(window.exerciseData[joint])) {
                    const fDiv = document.createElement('div'); fDiv.className = 'folder-box'; fDiv.setAttribute('data-old-folder-key', folder);
                    fDiv.innerHTML = `<div class="folder-title"><span>📂 <span class="folder-title-text" contenteditable="${window.isAdminMode}" style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:0 4px; border-radius:4px;' : ''}">${folder}</span></span>${window.isAdminMode ? `<div><button onclick="addExercise(this)">+</button> <button onclick="deleteFolder(this)">🗑️</button></div>` : ''}</div>`;
                    
                    exercises.forEach((ex) => {
                        const id = `${joint}_${ex}`; const isChecked = window.selectedExercises.some(s => s.id === id) ? 'checked' : '';
                        fDiv.innerHTML += `
                        <div class="exercise-item draggable-item" draggable="true" ondragstart="dragStart(event, '${joint}', '${ex}')" style="display:flex; align-items:center; margin-bottom:5px; cursor:grab;">
                            <label style="flex:1; display:flex; align-items:center; gap:5px; margin:0; cursor:grab;">
                                <input type="checkbox" data-joint="${joint}" data-folder="${folder}" data-name="${ex}" onchange="handleCheck(this)" ${isChecked}>
                                <span class="exercise-title-text" contenteditable="${window.isAdminMode}" data-old-ex-key="${ex}" 
                                      style="${window.isAdminMode ? 'background:#fff; border:1px dashed #aaa; padding:2px 4px; border-radius:4px; flex:1; cursor:text;' : 'flex:1;'}" 
                                      onclick="if(window.isAdminMode) event.preventDefault();">${ex}</span>
                            </label>
                            ${window.isAdminMode ? `<button onclick="deleteExercise(this, '${ex}')" style="margin-left:5px; border-radius:3px; border:1px solid #ccc; background:#fff; cursor:pointer; color:#e63946;">❌</button>` : ''}
                        </div>`;
                    }); div.appendChild(fDiv);
                } c.appendChild(div);
            }
            filterExercises();
        }

        window.renderPreview = function() {
            window.selectedExercises = window.selectedExercises.filter(item => {
                if (window.exerciseData[item.joint]) { for (let folder in window.exerciseData[item.joint]) { if (window.exerciseData[item.joint][folder].includes(item.name)) return true; } } return false; 
            });

            const container = document.getElementById('page-container');
            const pName = document.getElementById('pIn').value || "________"; const tName = sessionStorage.getItem('loggedInName') || "________";
            container.innerHTML = "";
            
            if (window.selectedExercises.length === 0) { 
                container.innerHTML = `
                <div class="empty-state drop-zone" ondragover="allowDrop(event)" ondrop="dropEmpty(event)">
                    <div class="empty-icon">📁</div>
                    <h2>선택된 운동이 없습니다</h2>
                    <p>왼쪽 목록의 운동을 이 곳으로 <b>드래그 앤 드롭</b> 하거나 체크박스를 누르세요.</p>
                </div>`; 
                return; 
            }
            
            window.selectedExercises.forEach((item, idx) => {
                const id = item.id; 
                const descText = item.customDesc || window.exerciseDescriptions[id] || "방법을 입력하세요.";
                let imgs = window.exerciseImages[id] || []; if (typeof imgs === 'string') imgs = [imgs];
                let imgHtml = imgs.length === 0 ? `<div class="no-img-placeholder">Ctrl+V로 사진 추가</div>` : `<div class="vertical-img-container">${imgs.map((src, i) => `<div class="split-img-item"><img src="${src}"><div class="img-idx-badge">${i+1}</div></div>`).join('')}</div>`;
                
                const vidUrl = window.exerciseVideos[id];
                const qrHtml = vidUrl ? `<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=${encodeURIComponent(vidUrl)}" class="qr-img"><div style="font-size:10px;text-align:center;margin-top:3px;font-weight:bold; color:#005b96;">영상</div></div>` : "";

                const fileUploadHtml = window.isAdminMode ? `
                    <div class="no-print" style="position: absolute; bottom: 10px; left: 10px; display:flex; gap:8px;">
                        <button class="img-edit-btn" onclick="document.getElementById('f_${id}').click()">📁 사진추가</button>
                        <button class="img-edit-btn" style="background:#00b4d8;" onclick="setVideoLink('${id}')">🔗 QR 링크</button>
                        ${imgs.length > 0 ? `<button class="img-edit-btn" style="background:#e63946;" onclick="clearImages('${id}')">🗑️ 지우기</button>` : ''}
                        <input type="file" id="f_${id}" accept="image/*" style="display:none" onchange="uploadLocalFile(this, '${id}')">
                    </div>` : '';
                
                // 🌟 동적 매크로 생성 🌟
                let dynamicMacros = window.macroList.map(m => `<button onclick="addMacro('${id}', '${m}')">${m.includes('🚨') ? `<span style="color:#e63946;">${m}</span>` : m}</button>`).join('');

                container.innerHTML += `
                <div class="a4-page drop-zone-page" id="preview_${id}" ondragover="handleDragOverPage(event)" ondragleave="handleDragLeavePage(event)" ondrop="dropOnPage(event, ${idx})">
                    <div class="page-header">
                        <h1>재활 운동 가이드</h1>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="patient-info">환자: <b style="color:#005b96;">${pName}</b> / 담당: <b>${tName}</b></div>
                            <button class="no-print page-delete-btn" onclick="removeExerciseFromPreview('${id}')" title="삭제">🗑️</button>
                        </div>
                    </div>
                    <div class="page-content">
                        <div class="img-wrap" tabindex="0" onpaste="handlePaste(event, '${id}')">${imgHtml}${fileUploadHtml}</div>
                        <div class="exercise-details">
                            <div class="exercise-title-row">
                                <h3>[${item.joint}] ${item.name}</h3>
                                ${window.isAdminMode ? `<button class="no-print save-btn" onclick="saveMasterDescription('${id}', document.getElementById('desc_${id}').innerHTML)" title="이 운동의 기본 설명을 영구적으로 덮어씁니다">💾 원본저장</button>` : ''}
                            </div>
                            <div class="macro-btns no-print">${dynamicMacros}</div>
                            <div contenteditable="true" id="desc_${id}" class="editable-desc">${descText}</div>
                            ${qrHtml}
                        </div>
                    </div>
                    <div class="page-footer"><div class="page-num-indicator">${idx + 1} / ${window.selectedExercises.length}</div></div>
                </div>`;
            });
        }
    </script>

</head>
<body class="landscape-mode">

    <div id="global-loader">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: bold; color: #005b96; font-size: 14px;">데이터를 불러오는 중입니다...</div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2>재활 시스템 로그인</h2>
            <input type="text" id="emp-id" placeholder="사원번호" onkeypress="if(event.key==='Enter')attemptLogin()">
            <input type="password" id="emp-pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter')attemptLogin()">
            <button onclick="attemptLogin()">로그인</button>
        </div>
    </div>

    <div class="top-right-controls no-print">
        <button id="mode-landscape-btn" class="mode-btn active" onclick="setPrintMode('landscape')">🗤 가로 모드</button>
        <button id="mode-portrait-btn" class="mode-btn" onclick="setPrintMode('portrait')">📄 세로 모드</button>
        <button class="print-btn-fixed" onclick="window.print()">🖨️ 인쇄하기</button>
    </div>

    <div id="main-app-container">
        <div id="sidebar">
            <div class="user-profile no-print"><div><span id="logged-in-user">-</span></div><button class="logout-btn" onclick="logout()">로그아웃</button></div>
            <div style="font-weight:bold; margin-bottom:10px; color:#005b96;">📋 목록 제어</div>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button class="admin-toggle-btn" style="flex:1; background:#00b4d8;" onclick="resetSelection()">🔄 선택 초기화</button>
            </div>
            
            <div id="sidebar-patient-inputs">
                <input type="text" id="pIn" placeholder="환자 성함" oninput="renderPreview()" class="search-box">
                <input type="text" id="chartIn" placeholder="병록번호" class="search-box">
            </div>
            
            <input type="text" id="searchEx" class="search-box no-print" placeholder="🔍 운동 검색 (예: 스쿼트)" oninput="filterExercises()">
            
            <div id="controls"></div>

            <div id="macro-management-section" style="display:none; margin-top:20px; border-top:2px dashed #eee; padding-top:15px;">
                <div style="font-weight:bold; margin-bottom:10px; color:#005b96;">💬 매크로 관리</div>
                <div id="macro-edit-list" style="margin-bottom:10px;"></div>
                <button onclick="addGlobalMacro()" style="width:100%; padding:8px; background:#00b4d8; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">+ 새 매크로 추가</button>
            </div>
        </div>

        <div id="patient-panel" class="no-print">
            <div style="font-weight:bold; margin-bottom:10px; color:#005b96;">📋 환자 처방 관리</div>
            <textarea id="pMemo" class="secret-memo" placeholder="📝 [치료사 전용] 환자 상태나 인수인계 메모 (인쇄 제외)"></textarea>
            <button class="save-routine-btn" style="width:100%; padding:12px; background:var(--save-teal); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;" onclick="savePatientRoutine()">💾 현재 처방 및 메모 저장</button>
            
            <input type="text" id="searchPatientIn" placeholder="🔍 이름/차트번호 검색..." oninput="searchPatients()" class="search-box" style="background:#fff;">
            
            <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #555;">나의 환자 목록</div>
            <div id="patient-list-container"></div>
        </div>
        
        <div id="preview-area"><div id="page-container"></div></div>
    </div>

    <div id="admin-app-container">
        <div style="width:400px; background:white; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h2 style="margin-top:0; color:#005b96;">👨‍⚕️ 치료사 계정 관리</h2>
            <div id="t-list" style="margin-bottom:20px; border:1px solid #eee; border-radius:8px; max-height:300px; overflow-y:auto; padding:10px; background:#fafafa;"></div>
            <button onclick="addTherapist()" style="width:100%; padding:12px; background:var(--save-teal); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">+ 새 치료사 등록</button>
        </div>
    </div>

    <div id="bottom-nav" class="no-print">
        <div id="tab-prescription" class="tab-btn active" onclick="switchTab('prescription')">
            <span style="font-size:18px; margin-bottom:3px;">🏠</span> 처방 & 인쇄
        </div>
        <div id="tab-management" class="tab-btn" onclick="switchTab('management')">
            <span style="font-size:18px; margin-bottom:3px;">⚙️</span> 운동 관리
        </div>
        <div id="tab-admin" class="tab-btn" style="display:none;" onclick="switchTab('admin')">
            <span style="font-size:18px; margin-bottom:3px;">👤</span> 인사 관리
        </div>
    </div>

</body>
</html>
